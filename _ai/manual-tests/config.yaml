server_instructions: |
  Local Twenty dev server is expected at http://localhost:3000.
  Start and seed it with:
    ./dev reset
  Verify health with:
    curl -fsS http://localhost:3000/healthz

categories:
  foundation:
    pattern: "MT-FOUND-*"
    description: "CLI foundation and local dev server checks"
  auth:
    pattern: "MT-AUTH-*"
    description: "Auth and config resolution checks against local Twenty"
  onboarding:
    pattern: "MT-ONB-*"
    description: "First-run install and no-config onboarding experience"
  entities:
    pattern: "MT-ENT-*"
    description: "People, company, and deal search/get/create/update flows"
  workflows:
    pattern: "MT-WF-*"
    description: "Note, task, meeting, and call workflows"
  import:
    pattern: "MT-IMP-*"
    description: "Prospect import, dry-run, and duplicate-handling flows"

setup: |
  Prerequisites before running this plan:
  - The repo worktree is /Users/jv/gt/twenty_crm_cli/crew/conduit
  - Local Twenty stack is healthy via ./dev ps
  - ./.twenty/settings exists from ./dev reset
  - Demo workspace credentials should exist in ./.twenty/dev-server.env
  - `jq` is available for extracting IDs from JSON command output
  - Run foundation/auth tests before entity and workflow tests
